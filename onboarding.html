<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>Onboarding</title><link rel='stylesheet' href='styles.css'><link href='https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap' rel='stylesheet'></head><body><main class='container'><div class='form-wrap'>
<section class='form-card'><div class='brand' style='font-size:34px'><span>🧠</span><span>BabyBrain.sg</span></div><h2>Step 1 of 3<br>Let’s get to know you</h2><div class='field'><input placeholder='Full name'></div><div class='field'><input placeholder='Email'></div><div class='field'><input placeholder='Phone'></div><div class='field'><input placeholder='Postcode'></div><button class='btn' style='width:100%'>Continue</button></section>
<section class='form-card'><h2>Step 2 of 3<br>Tell us about your child</h2><div class='field'><input placeholder="Child's name"></div><div class='field'><input placeholder='DD/MM/YYYY'></div><div class='pill-row'><span class='pill'>Music</span><span class='pill'>Sensory Play</span><span class='pill'>Art</span><span class='pill'>Movement</span></div><div class='field' style='margin-top:14px'><textarea rows='4' placeholder='Any preferences?'></textarea></div><button class='btn' style='width:100%'>Continue</button></section>
<section class='form-card'><h2>Step 3 of 3<br>Here’s a preview</h2><p class='lead' style='font-size:22px'>Parent, child and preferences summary before matching.</p><div class='card'>Sarah Tan<br>Singapore</div><div class='card'>Emma Tan, 2y 3m</div><button class='btn ghost' style='width:100%'>Back</button><button class='btn' style='width:100%;margin-top:10px'>Show me options</button></section>
</div></main></body></html>
